name: app_review_dialog
description: A beautiful, localised in-app rating dialog for Flutter. Shows a star rating prompt; positive ratings invite a store review, negative ones open a feedback email.
version: 2.0.1
repository: https://github.com/emavgl/app_review_dialog
issue_tracker: https://github.com/emavgl/app_review_dialog/issues

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
